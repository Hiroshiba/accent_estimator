dataset:
  train:
    wave_pathlist_path: "tests/data/test_data/train_wave_pathlist.txt"
    phoneme_list_pathlist_path: "tests/data/test_data/train_phoneme_list_pathlist.txt"
    accent_start_pathlist_path: "tests/data/test_data/train_accent_start_pathlist.txt"
    accent_end_pathlist_path: "tests/data/test_data/train_accent_end_pathlist.txt"
    accent_phrase_start_pathlist_path: "tests/data/test_data/train_accent_phrase_start_pathlist.txt"
    accent_phrase_end_pathlist_path: "tests/data/test_data/train_accent_phrase_end_pathlist.txt"
    speaker_dict_path: "tests/data/test_data/speaker_dict.json"
    root_dir: "tests/data/test_data"
  valid:
    wave_pathlist_path: "tests/data/test_data/valid_wave_pathlist.txt"
    phoneme_list_pathlist_path: "tests/data/test_data/valid_phoneme_list_pathlist.txt"
    accent_start_pathlist_path: "tests/data/test_data/valid_accent_start_pathlist.txt"
    accent_end_pathlist_path: "tests/data/test_data/valid_accent_end_pathlist.txt"
    accent_phrase_start_pathlist_path: "tests/data/test_data/valid_accent_phrase_start_pathlist.txt"
    accent_phrase_end_pathlist_path: "tests/data/test_data/valid_accent_phrase_end_pathlist.txt"
    speaker_dict_path: "tests/data/test_data/speaker_dict.json"
    root_dir: "tests/data/test_data"
  hdf5_cache_dir: null
  train_num: null
  test_num: 10
  eval_for_test: true
  eval_times_num: 1
  seed: 42
  sampling_rate: 16000
  frame_rate: 50

network:
  ssl_model_type: "hubert"
  ssl_model_path: "not/exist/path"
  sampling_rate: 16000
  frame_rate: 50
  vowel_embedding_size: 4
  hidden_size: 16
  conformer_block_num: 2
  conformer_dropout_rate: 0.1
  speaker_size: 3
  speaker_embedding_size: 4

model: {}

train:
  batch_size: 4
  gradient_accumulation: 2
  eval_batch_size: 8
  log_epoch: 2
  eval_epoch: 4
  snapshot_epoch: 4
  stop_epoch: 20
  model_save_num: 2
  optimizer:
    name: "RAdamScheduleFree"
    lr: 0.003
  scheduler: null
  prefetch_workers: 4 # NOTE: 本番では256が推奨
  preprocess_workers: 0 # NOTE: 本番ではnullが推奨
  use_gpu: false
  use_amp: false

project:
  name: "test_project"
  category: "test"
