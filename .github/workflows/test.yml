name: Test

on:
  push:
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - name: <Setup> リポジトリをチェックアウト
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: <Setup> uvをインストール
        uses: astral-sh/setup-uv@d0cc045d04ccac9d8b7881df0226f9e82c39688e # v6.8.0

      - name: <Setup> Pythonをセットアップ
        run: uv python install

      - name: <Setup> 依存関係をインストール
        run: uv sync

      - name: <Test> 静的解析を実行
        run: |
          uv run pyright
          uv run ruff check
          uv run ruff format --check

      - name: <Test> テストを実行
        run: uv run pytest tests/

  docker-build:
    runs-on: ubuntu-latest

    steps:
      - name: <Setup> リポジトリをチェックアウト
        uses: actions/checkout@34e114876b0b11c390a56381ad16ebd13914f8d5 # v4.3.1

      - name: <Test> Dockerイメージをビルド
        run: docker build -t hiho_pytorch_base .

      - name: <Test> Dockerイメージを確認
        run: docker images hiho_pytorch_base
